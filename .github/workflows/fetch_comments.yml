name: Fetch Comments

on:
  schedule:
    - cron: "0 14 * * *"   # 10 AM ET daily
  workflow_dispatch:         # manual trigger from Actions tab

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch comments
        env:
          REGULATIONS_GOV_API_KEY: ${{ secrets.REGULATIONS_GOV_API_KEY }}
        run: python scripts/fetch_comments.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/comments.json
          git diff --cached --quiet || git commit -m "chore: update comments $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
